{% extends 'catalog/base.html' %}

{% block title %}Добавление товара{% endblock %}

{% block content %}
<div class="col-lg-5 col-md-6 col-sm-12">
    <div class="card mb-4 box-shadow">
        <div class="card-header">
            <h4 class="my-0 font-weight-normal">Удалить товар</h4>
          <p>Вы уверены, что хотите удалить "{{product.product_name}}"</p>
        </div>
        <div class="card-body">
            <form method="post" action="" class="form-floating" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-lg btn-block btn-outline-danger">
                    Удалить
                </button>
                <a href="{% url 'catalog:product_list' %}" class="btn btn-lg btn-block btn-outline-primary">Отмена</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
