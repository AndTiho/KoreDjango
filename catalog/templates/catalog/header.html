<header>
    <div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom box-shadow great-vibes-regular">
        <h5 class="my-0 mr-md-auto font-weight-normal">KoreDjango</h5>
        <nav class="ms-5 d-flex justify-content-between w-100">
            <div>
                <a class="p-1 btn btn-outline-primary" href="{% url 'catalog:home' %}">Главная</a>
                <a class="p-1 btn btn-outline-primary" href="/">Каталог</a>
                <a class="p-1 btn btn-outline-primary" href="{% url 'catalog:product_list' %}">Список товаров</a>
                <a class="p-1 btn btn-outline-primary" href="{% url 'catalog:product_add' %}">Добавить товар</a>
                <a class="p-1 btn btn-outline-primary" href="{% url 'catalog:contacts' %}">Контакты</a>
            </div>
            {% if user.is_authenticated %}
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <span class="fs-5 text-nowrap">Мы рады вам, {{ user.username }}!</span>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-primary px-3 fs-6"
                       href="{% url 'users:profile_detail' user.pk %}">Профиль</a>
                    <form method="post" action="{% url 'users:logout' %}" class="m-0 d-inline">
                        {% csrf_token %}
                        <button type="submit"
                                class="btn btn-outline-primary px-3 fs-6">Выйти
                        </button>
                    </form>
                </div>
            </div>
            {% else %}
            <ul class="list-inline m-0 d-flex align-items-center">
                <li class="list-inline-item">
                    <a class="p-1 btn btn-outline-primary" href="{% url 'users:login' %}">Вход</a>
                </li>
                <li class="list-inline-item">
                    <a class="p-1 btn btn-outline-primary" href="{% url 'users:register' %}">Регистрация</a>
                </li>
            </ul>
            {% endif %}
        </nav>
    </div>
</header>
